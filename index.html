<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NieTracker | Experience Next</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #030308;
            --accent-primary: #8b5cf6;
            --accent-secondary: #d946ef;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.07);
            --mouse-x: 50%;
            --mouse-y: 50%;
        }

        * { box-sizing: border-box; transition: all 0.5s cubic-bezier(0.15, 0, 0.5, 1); }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* УЛУЧШЕННЫЙ ЖИВОЙ ФОН */
        .nebula-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(217, 70, 239, 0.1) 0%, transparent 50%),
                radial-gradient(circle at center, #0a0a1a 0%, var(--bg-dark) 100%);
            animation: nebulaMove 20s infinite alternate ease-in-out;
        }

        @keyframes nebulaMove {
            0% { transform: scale(1); }
            100% { transform: scale(1.1) rotate(2deg); }
        }

        /* ШАПКА И ЛОГО */
        .header { padding: 100px 20px 50px; text-align: center; }

        .logo-container {
            width: 130px; height: 130px; margin: 0 auto 30px;
            position: relative;
        }

        .logo-img {
            width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 0 30px var(--accent-primary));
            animation: float 4s infinite ease-in-out;
        }

        /* ИНТЕРАКТИВНЫЙ ЗАГОЛОВОК */
        .main-title {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 900;
            margin: 0;
            letter-spacing: -4px;
            text-transform: uppercase;
            position: relative;
            background: radial-gradient(
                circle at var(--mouse-x) var(--mouse-y), 
                #fff 0%, 
                var(--accent-primary) 30%, 
                var(--accent-secondary) 60%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        /* НАВИГАЦИЯ */
        .nav-tabs {
            display: flex; justify-content: center; gap: 12px; margin-bottom: 60px;
        }

        .tab-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 14px 35px; border-radius: 100px;
            color: rgba(255,255,255,0.5); cursor: pointer;
            font-weight: 700; backdrop-filter: blur(10px);
        }

        .tab-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.06); }

        .tab-btn.active {
            background: #fff; color: #000; transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(139, 92, 246, 0.4);
        }

        /* КАРТОЧКИ */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 25px 120px; width: 100%; flex: 1; }
        .grid { display: none; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; }
        .grid.active { display: grid; animation: slideUp 0.6s ease; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 30px; overflow: hidden; backdrop-filter: blur(20px);
            display: flex; flex-direction: column; position: relative;
        }

        .card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 40px 80px rgba(0,0,0,0.7);
        }

        .card-img { width: 100%; height: 200px; object-fit: cover; transition: 0.8s; }
        .card:hover .card-img { transform: scale(1.1); }

        .card-content { padding: 30px; flex: 1; display: flex; flex-direction: column; }
        .card-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 25px; }

        /* КНОПКИ */
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: auto; }
        .btn { padding: 16px; border-radius: 18px; text-decoration: none; font-weight: 800; text-align: center; border: none; cursor: pointer; }
        
        .btn-download { background: #fff; color: #000; position: relative; overflow: hidden; }
        .btn-download:hover { background: var(--accent-primary); color: #fff; box-shadow: 0 0 30px var(--accent-primary); }

        .btn-secondary { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border); }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); border-color: #fff; }

        /* ФУТЕР И ТЕЛЕГРАММ */
        footer {
            padding: 80px 20px; text-align: center;
            background: linear-gradient(to top, rgba(13, 13, 26, 0.9), transparent);
            backdrop-filter: blur(10px); border-top: 1px solid var(--glass-border);
        }

        .tg-container { position: relative; display: inline-block; }

        .tg-btn {
            display: inline-flex; align-items: center; padding: 20px 45px;
            background: #fff; color: #000; border-radius: 100px;
            text-decoration: none; font-weight: 900; font-size: 1.1rem;
            position: relative; z-index: 2;
        }

        .tg-glow {
            position: absolute; inset: 0; background: #0088cc;
            filter: blur(20px); border-radius: 100px; opacity: 0;
            transition: 0.5s; z-index: 1;
        }

        .tg-container:hover .tg-glow { opacity: 0.7; transform: scale(1.2); }
        .tg-container:hover .tg-btn { background: #0088cc; color: #fff; transform: translateY(-5px); }

        .footer-info { margin-top: 30px; opacity: 0.3; font-size: 12px; letter-spacing: 2px; }

        /* МОДАЛКА */
        #modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px); z-index: 2000; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            background: #0d0d1a; padding: 50px; border-radius: 40px;
            max-width: 500px; width: 100%; border: 1px solid var(--glass-border); text-align: center;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body>

    <div class="nebula-bg"></div>

    <header class="header">
        <div class="logo-container">
            <img src="img/logo2.png" alt="Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/150/030308/fff?text=NT'">
        </div>
        <h1 class="main-title" id="title">NIETRACKER</h1>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('games', event)">ИГРЫ</button>
        <button class="tab-btn" onclick="switchTab('other', event)">ДРУГОЕ</button>
    </div>

    <div class="container">
        <div id="games" class="grid active"></div>
        <div id="other" class="grid"></div>
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="margin-top:0">ИНСТРУКЦИЯ</h2>
            <p id="modal-text" style="color: rgba(255,255,255,0.6); line-height: 1.8; margin-bottom: 30px;"></p>
            <button class="btn btn-download" style="width: 100%" onclick="closeModal()">ПОНЯТНО</button>
        </div>
    </div>

    <footer>
        <div class="tg-container">
            <div class="tg-glow"></div>
            <a href="https://t.me/nierosyjski" target="_blank" class="tg-btn">
                TELEGRAM КАНАЛ
            </a>
        </div>
        <div class="footer-info">
            PETTA RAIN | NIETRACKER &copy; 2026 
            <a href="admin.html" style="text-decoration: none; color: inherit; opacity: 0.5;">.</a>
        </div>
    </footer>

    <script>
        // СЛЕДИМ ЗА МЫШКОЙ ДЛЯ ЭФФЕКТА ТЕКСТА
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.documentElement.style.setProperty('--mouse-x', `${x}%`);
            document.documentElement.style.setProperty('--mouse-y', `${y}%`);
        });

        let globalData = { games: [], other: [] };

        async function loadData() {
            try {
                const response = await fetch('data.json');
                globalData = await response.json();
                render();
            } catch (e) { console.error("Data error", e); }
        }

        function createCard(item) {
            let label = item.label ? `<div style="position:absolute; top:20px; left:20px; background:var(--accent-secondary); padding:5px 12px; border-radius:10px; font-size:10px; font-weight:900; z-index:2;">${item.label}</div>` : '';
            let btns = `<a href="${item.downloadUrl}" target="_blank" class="btn btn-download">СКАЧАТЬ</a>`;
            
            if (item.instruction) {
                const txt = item.instruction.replace(/'/g, "&apos;").replace(/"/g, "&quot;");
                btns += `<button class="btn btn-secondary" onclick="showModal('${txt}')">ИНСТРУКЦИЯ</button>`;
            }
            if (item.getUrl) {
                btns += `<a href="${item.getUrl}" target="_blank" class="btn btn-secondary">ПОЛУЧИТЬ</a>`;
            }

            return `
                <div class="card">
                    ${label}
                    <img src="${item.image}" class="card-img" onerror="this.src='https://via.placeholder.com/400x250/0d0d1a/ffffff?text=NieTracker'">
                    <div class="card-content">
                        <div class="card-title">${item.title}</div>
                        <div class="btn-group">${btns}</div>
                    </div>
                </div>
            `;
        }

        function render() {
            document.getElementById('games').innerHTML = globalData.games.map(createCard).join('');
            document.getElementById('other').innerHTML = globalData.other.map(createCard).join('');
        }

        function switchTab(id, e) {
            document.querySelectorAll('.grid, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
        }

        function showModal(txt) {
            document.getElementById('modal-text').innerText = txt;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        window.onload = loadData;
    </script>
</body>
</html>
