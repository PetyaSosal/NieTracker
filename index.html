<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NieTracker | Experience Next</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0c050a;
            --accent-primary: #ff2a6d;
            --accent-secondary: #ff79b5;
            --accent-glow: #ff4da6;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.10);
        }

        :root.dark-theme {
            --bg-dark: #000000;
            --accent-primary: #ffffff;
            --accent-secondary: #e0e0e0;
            --accent-glow: #ffffff;
            --glass: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            transition: all 0.45s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body {
            margin: 0;
            background: #0a0308;
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Фон */
        .nebula-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: 
                radial-gradient(circle at 25% 25%, rgba(255, 42, 109, 0.28) 0%, transparent 55%),
                radial-gradient(circle at 75% 75%, rgba(255, 121, 181, 0.22) 0%, transparent 60%),
                radial-gradient(circle at 50% 40%, rgba(255, 77, 166, 0.15) 0%, transparent 70%),
                linear-gradient(135deg, #0a0308 0%, #14080f 100%);
            animation: nebulaPulse 28s infinite alternate ease-in-out;
            filter: blur(3px);
        }

        :root.dark-theme .nebula-bg {
            background: 
                radial-gradient(circle at 25% 25%, rgba(255, 255, 255, 0.08) 0%, transparent 55%),
                radial-gradient(circle at 75% 75%, rgba(255, 255, 255, 0.05) 0%, transparent 60%),
                radial-gradient(circle at 50% 40%, rgba(255, 255, 255, 0.03) 0%, transparent 70%),
                linear-gradient(135deg, #000000 0%, #0a0a0a 100%);
            animation: darkPulse 40s infinite alternate ease-in-out;
        }

        @keyframes darkPulse {
            0% {
                background: 
                    radial-gradient(circle at 25% 25%, rgba(255, 255, 255, 0.08) 0%, transparent 55%),
                    radial-gradient(circle at 75% 75%, rgba(255, 255, 255, 0.05) 0%, transparent 60%),
                    radial-gradient(circle at 50% 40%, rgba(255, 255, 255, 0.03) 0%, transparent 70%),
                    linear-gradient(135deg, #000000 0%, #0a0a0a 100%);
            }
            25% {
                background: 
                    radial-gradient(circle at 35% 20%, rgba(255, 255, 255, 0.12) 0%, transparent 55%),
                    radial-gradient(circle at 65% 80%, rgba(255, 255, 255, 0.07) 0%, transparent 60%),
                    radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.05) 0%, transparent 70%),
                    linear-gradient(135deg, #000000 0%, #0a0a0a 100%);
            }
            50% {
                background: 
                    radial-gradient(circle at 50% 30%, rgba(255, 255, 255, 0.1) 0%, transparent 55%),
                    radial-gradient(circle at 40% 70%, rgba(255, 255, 255, 0.06) 0%, transparent 60%),
                    radial-gradient(circle at 60% 50%, rgba(255, 255, 255, 0.04) 0%, transparent 70%),
                    linear-gradient(135deg, #000000 0%, #0a0a0a 100%);
            }
            75% {
                background: 
                    radial-gradient(circle at 30% 35%, rgba(255, 255, 255, 0.11) 0%, transparent 55%),
                    radial-gradient(circle at 70% 65%, rgba(255, 255, 255, 0.065) 0%, transparent 60%),
                    radial-gradient(circle at 50% 45%, rgba(255, 255, 255, 0.045) 0%, transparent 70%),
                    linear-gradient(135deg, #000000 0%, #0a0a0a 100%);
            }
            100% {
                background: 
                    radial-gradient(circle at 25% 25%, rgba(255, 255, 255, 0.08) 0%, transparent 55%),
                    radial-gradient(circle at 75% 75%, rgba(255, 255, 255, 0.05) 0%, transparent 60%),
                    radial-gradient(circle at 50% 40%, rgba(255, 255, 255, 0.03) 0%, transparent 70%),
                    linear-gradient(135deg, #000000 0%, #0a0a0a 100%);
            }
        }

        @keyframes nebulaPulse {
            0%   { opacity: 0.9; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.07); }
        }

        /* Частицы за курсором */
        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            mix-blend-mode: screen;
            opacity: 0.85;
        }

        :root.dark-theme #particle-canvas {
            mix-blend-mode: addition;
            opacity: 0.95;
        }

        .glow-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), 
                        rgba(255, 77, 166, 0.18) 0%, transparent 45%);
            pointer-events: none;
        }

        :root.dark-theme .glow-overlay {
            background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), 
                        rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0.08) 15%, transparent 40%);
            box-shadow: 0 0 80px rgba(255, 255, 255, 0.3);
        }

        .header {
            padding: 130px 20px 70px;
            text-align: center;
            color: #fff;
        }

        :root.dark-theme .header {
            color: #e0e0e0;
        }

        .logo-container {
            width: 145px;
            height: 145px;
            margin: 0 auto 40px;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 50px var(--accent-glow)) brightness(1.2);
            animation: float 6s infinite ease-in-out;
        }

        :root.dark-theme .logo-img {
            filter: drop-shadow(0 0 40px rgba(255, 255, 255, 0.5)) brightness(1.1);
            opacity: 0.95;
        }

        .main-title {
            font-size: clamp(3.4rem, 9.5vw, 6.2rem);
            font-weight: 900;
            letter-spacing: -6px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ffffff, var(--accent-primary), var(--accent-secondary), #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 250% 250%;
            animation: titleGradient 10s linear infinite;
            filter: drop-shadow(0 20px 40px rgba(255, 42, 109, 0.6));
        }

        :root.dark-theme .main-title {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(90deg, #ffffff, #e0e0e0, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.6)) drop-shadow(0 0 40px rgba(255, 255, 255, 0.3));
        }

        @keyframes titleGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-bottom: 80px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 16px 42px;
            border-radius: 9999px;
            color: rgba(255,255,255,0.65);
            font-weight: 700;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        :root.dark-theme .tab-btn {
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .tab-btn:hover {
            color: white;
            transform: translateY(-5px);
            border-color: var(--accent-secondary);
        }

        :root.dark-theme .tab-btn:hover {
            border-color: #ffffff;
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        .tab-btn.active {
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            box-shadow: 0 25px 50px rgba(255, 42, 109, 0.5);
        }

        :root.dark-theme .tab-btn.active {
            background: linear-gradient(90deg, #ffffff, #e0e0e0);
            color: #000000;
            box-shadow: 0 25px 50px rgba(255, 255, 255, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.2);
            font-weight: 900;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 25px 140px;
        }

        .grid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 38px;
        }

        .grid.active {
            display: grid;
            animation: fadeInUp 0.9s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(70px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 34px;
            overflow: hidden;
            backdrop-filter: blur(24px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        :root.dark-theme .card {
            box-shadow: 0 25px 60px rgba(255, 255, 255, 0.08), inset 0 0 20px rgba(255, 255, 255, 0.02);
        }

        .card:hover {
            transform: translateY(-20px) scale(1.035);
            border-color: var(--accent-secondary);
            box-shadow: 0 45px 100px rgba(255, 42, 109, 0.4);
        }

        :root.dark-theme .card:hover {
            border-color: #ffffff;
            box-shadow: 0 45px 100px rgba(255, 255, 255, 0.15), 0 0 40px rgba(255, 255, 255, 0.2), inset 0 0 20px rgba(255, 255, 255, 0.03);
        }

        .card-img {
            width: 100%;
            height: 230px;
            object-fit: cover;
        }

        .card:hover .card-img {
            transform: scale(1.13);
        }

        .card-content {
            padding: 34px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 30px;
            color: #fff;
        }

        :root.dark-theme .card-title {
            color: #ffffff;
            font-weight: 900;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: auto;
        }

        .btn {
            padding: 17px;
            border-radius: 22px;
            font-weight: 800;
            text-align: center;
            cursor: pointer;
            border: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Стили для лейблов на карточках */
        .card-label {
            position: absolute;
            top: 22px;
            left: 22px;
            background: var(--accent-primary);
            padding: 6px 15px;
            border-radius: 12px;
            font-size: 10.5px;
            font-weight: 900;
            z-index: 2;
        }

        :root.dark-theme .card-label {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            font-weight: 900;
        }

        .btn-download {
            background: white;
            color: #0a0308;
        }

        :root.dark-theme .btn-download {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            font-weight: 900;
        }

        .btn-download:hover {
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            box-shadow: 0 0 45px var(--accent-glow);
        }

        :root.dark-theme .btn-download:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.8), 0 0 30px rgba(255, 255, 255, 0.5);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.07);
            color: white;
            border: 1px solid var(--glass-border);
        }

        :root.dark-theme .btn-secondary {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.15);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
            border-color: var(--accent-secondary);
        }

        :root.dark-theme .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
            border-color: #ffffff;
            box-shadow: 0 0 35px rgba(255, 255, 255, 0.3), inset 0 0 15px rgba(255, 255, 255, 0.1);
        }

        /* Модальное окно — исправленное и красивое */
        #modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 3, 8, 0.95);
            backdrop-filter: blur(25px);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        :root.dark-theme #modal {
            background: rgba(0, 0, 0, 0.99);
            backdrop-filter: blur(40px);
        }

        .modal-content {
            background: rgba(20, 8, 15, 0.98);
            padding: 50px 45px;
            border-radius: 32px;
            max-width: 520px;
            width: 100%;
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: 0 30px 80px rgba(255, 42, 109, 0.35);
        }

        :root.dark-theme .modal-content {
            background: rgba(5, 5, 5, 0.99);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 
                0 30px 80px rgba(255, 255, 255, 0.15),
                inset 0 0 50px rgba(255, 255, 255, 0.05),
                0 0 40px rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 60px 50px;
        }

        .modal-content h2 {
            margin: 0 0 25px 0;
            font-size: 2rem;
            color: var(--accent-secondary);
        }

        :root.dark-theme .modal-content h2 {
            font-family: 'Cinzel', serif;
            color: #ffffff;
            font-size: 2.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
        }

        :root.dark-theme .modal-content p {
            color: #d0d0d0 !important;
            font-size: 1.05rem;
            line-height: 1.8;
            letter-spacing: 0.5px;
        }

        /* Футер */
        footer {
            padding: 100px 20px 70px;
            text-align: center;
            background: linear-gradient(to top, rgba(10, 3, 8, 0.95), transparent);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        :root.dark-theme footer {
            background: linear-gradient(to top, rgba(0, 0, 0, 0.99), transparent);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .dev-profile {
            display: inline-flex;
            align-items: center;
            gap: 18px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 18px 28px;
            border-radius: 30px;
            backdrop-filter: blur(20px);
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }

        :root.dark-theme .dev-profile {
            box-shadow: 0 15px 40px rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .dev-profile:hover {
            transform: translateY(-6px);
            border-color: var(--accent-secondary);
            box-shadow: 0 25px 55px rgba(255, 42, 109, 0.35);
        }

        :root.dark-theme .dev-profile:hover {
            border-color: #ffffff;
            box-shadow: 0 25px 55px rgba(255, 255, 255, 0.25), 0 0 40px rgba(255, 255, 255, 0.2);
        }

        .dev-avatar {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-primary);
            box-shadow: 0 0 25px rgba(255, 42, 109, 0.5);
        }

        :root.dark-theme .dev-avatar {
            border-color: #ffffff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3), inset 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .dev-info h3 {
            margin: 0;
            font-size: 1.35rem;
            font-weight: 800;
        }

        .dev-info p {
            margin: 4px 0 0;
            font-size: 0.95rem;
            color: var(--accent-secondary);
        }

        :root.dark-theme .dev-info h3 {
            color: #ffffff;
            font-family: 'Cinzel', serif;
        }

        :root.dark-theme .dev-info p {
            color: #b0b0b0;
        }

        .footer-info {
            margin-top: 45px;
            opacity: 0.4;
            font-size: 13px;
            letter-spacing: 2px;
            color: #fff;
        }

        body.theme-transition {
            animation: themeFlip 1.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes themeFlip {
            0% {
                filter: brightness(1) saturate(1);
                transform: scale(1);
            }
            10% {
                filter: brightness(2) saturate(0) blur(4px) invert(1);
                transform: scale(1.02);
            }
            20% {
                filter: brightness(0.2) saturate(0) blur(8px);
                transform: scale(0.92);
            }
            30% {
                filter: brightness(0.1) saturate(0);
                transform: scale(0.88) rotateZ(0.5deg);
            }
            40% {
                filter: brightness(0.05) saturate(0);
                transform: scale(0.85);
            }
            50% {
                filter: brightness(0.02) saturate(0);
                transform: scale(0.83);
            }
            60% {
                filter: brightness(0.1) saturate(0);
                transform: scale(0.85) rotateZ(-0.5deg);
            }
            70% {
                filter: brightness(0.3) saturate(0.2) blur(6px);
                transform: scale(0.92);
            }
            80% {
                filter: brightness(1.5) saturate(0) blur(2px) invert(0.5);
                transform: scale(1.01);
            }
            100% {
                filter: brightness(1) saturate(1);
                transform: scale(1);
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <div class="nebula-bg"></div>
    <canvas id="particle-canvas"></canvas>
    <div class="glow-overlay" id="glow-overlay"></div>

    <header class="header">
        <div class="logo-container">
            <img src="img/logo2.png" alt="Logo" class="logo-img" 
                 onerror="this.src='https://via.placeholder.com/150/0a0308/fff?text=NT'">
        </div>
        <h1 class="main-title">NIETRACKER</h1>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('games', event)">ИГРЫ</button>
        <button class="tab-btn" onclick="switchTab('other', event)">ДРУГОЕ</button>
    </div>

    <div class="container">
        <div id="games" class="grid active"></div>
        <div id="other" class="grid"></div>
    </div>

    <!-- Исправленная модалка -->
    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2>ИНСТРУКЦИЯ</h2>
            <p id="modal-text" style="color: rgba(255,255,255,0.85); line-height: 1.85; font-size: 1.05rem;"></p>
            <button class="btn btn-download" style="width: 100%; margin-top: 30px; padding: 18px;" onclick="closeModal()">
                ПОНЯТНО
            </button>
        </div>
    </div>

    <footer>
        <div class="dev-profile" onclick="window.open('https://github.com/PetyaSosal', '_blank')">
            <img src="https://github.com/PetyaSosal.png" alt="Pettanko" class="dev-avatar">
            <div class="dev-info">
                <h3>Pettanko</h3>
                <p>Дурачок и фембой, футфетешист</p>
            </div>
        </div>
        <div class="footer-info">
            Автор: Pettanko • NieTracker <span id="copyright-symbol" style="cursor: pointer; user-select: none;">©</span> 2025—2026
        </div>
    </footer>

    <script>
        // Счетчик кликов на ©
        let copyrightClicks = 0;
        
        document.addEventListener('DOMContentLoaded', () => {
            const copyrightSymbol = document.getElementById('copyright-symbol');
            if (copyrightSymbol) {
                copyrightSymbol.addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyrightClicks++;
                    
                    if (copyrightClicks === 7) {
                        toggleDarkTheme();
                        copyrightClicks = 0;
                    }
                });
            }
        });

        function toggleDarkTheme() {
            const html = document.documentElement;
            const body = document.body;
            
            // Добавляем класс анимации
            body.classList.add('theme-transition');
            
            // После завершения анимации, переключаем тему
            setTimeout(() => {
                html.classList.toggle('dark-theme');
                localStorage.setItem('darkTheme', html.classList.contains('dark-theme'));
            }, 900); // Половина от 1.8s анимации
            
            // Убираем класс анимации после завершения
            setTimeout(() => {
                body.classList.remove('theme-transition');
            }, 1800);
        }

        // Загрузка сохраненной тему при загрузке
        window.addEventListener('load', () => {
            if (localStorage.getItem('darkTheme') === 'true') {
                document.documentElement.classList.add('dark-theme');
            }
        });

        // Пиксельные частицы
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouseX = 0, mouseY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor(x, y) {
                const isDarkTheme = document.documentElement.classList.contains('dark-theme');
                
                this.x = x;
                this.y = y;
                
                if (isDarkTheme) {
                    // Молниеносные частицы для темной темы
                    this.size = Math.random() * 4 + 1;
                    this.speedX = (Math.random() - 0.5) * 1.2;
                    this.speedY = (Math.random() - 0.5) * 1.2;
                    this.life = 80;
                    this.color = `rgba(255, 255, 255, ${0.6 + Math.random() * 0.4})`;
                    this.gravity = 0;
                    this.brightness = 0.7 + Math.random() * 0.3;
                } else {
                    // Оригинальные пиксельные частицы
                    this.size = Math.random() * 3.5 + 1.5;
                    this.speedX = Math.random() * 1.4 - 0.7;
                    this.speedY = Math.random() * 1.4 - 0.7;
                    this.life = 48;
                    this.color = `hsl(330, 95%, ${78 + Math.random() * 22}%)`;
                    this.gravity = 0;
                }
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += this.gravity;
                this.life -= this.life > 50 ? 1.15 : 2;
                this.speedX *= 0.97;
                this.speedY *= 0.97;
            }

            draw(isDarkTheme) {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = isDarkTheme ? (this.life / 80) * 0.8 : (this.life / 48);
                
                if (isDarkTheme) {
                    // Молниеносный эффект - звездообразные частицы
                    ctx.beginPath();
                    for (let i = 0; i < 4; i++) {
                        const angle = (Math.PI * 2 * i) / 4;
                        const px = Math.cos(angle) * this.size;
                        const py = Math.sin(angle) * this.size;
                        if (i === 0) {
                            ctx.moveTo(this.x + px, this.y + py);
                        } else {
                            ctx.lineTo(this.x + px, this.y + py);
                        }
                    }
                    ctx.closePath();
                    ctx.fill();
                    
                    // Дополнительный блеск
                    ctx.fillStyle = `rgba(255, 255, 255, ${(this.life / 80) * 0.4})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    // Пиксельный эффект
                    ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                }
            }
        }

        function animateParticles() {
            const isDarkTheme = document.documentElement.classList.contains('dark-theme');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Увеличить генерацию частиц в темной теме
            const spawnChance = isDarkTheme ? 0.85 : 0.7;
            if (Math.random() < spawnChance) particles.push(new Particle(mouseX, mouseY));

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw(isDarkTheme);
                
                const maxLife = isDarkTheme ? 100 : 48;
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animateParticles);
        }

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            document.getElementById('glow-overlay').style.setProperty('--mouse-x', `${e.clientX}px`);
            document.getElementById('glow-overlay').style.setProperty('--mouse-y', `${e.clientY}px`);
        });

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        animateParticles();

        // Основной функционал
        let globalData = { games: [], other: [] };

        async function loadData() {
            try {
                const response = await fetch('data.json');
                globalData = await response.json();
                render();
            } catch (e) { console.error("Data error", e); }
        }

        function createCard(item) {
            let label = item.label ? 
                `<div class="card-label">${item.label}</div>` : '';

            let btns = `<a href="${item.downloadUrl}" target="_blank" class="btn btn-download">СКАЧАТЬ</a>`;
           
            if (item.instruction) {
                const txt = item.instruction.replace(/'/g, "&apos;").replace(/"/g, "&quot;");
                btns += `<button class="btn btn-secondary" onclick="showModal('${txt}')">ИНСТРУКЦИЯ</button>`;
            }
            if (item.getUrl) {
                btns += `<a href="${item.getUrl}" target="_blank" class="btn btn-secondary">ПОЛУЧИТЬ</a>`;
            }

            return `
                <div class="card">
                    ${label}
                    <img src="${item.image}" class="card-img" onerror="this.src='https://via.placeholder.com/400x250/0a0308/ffffff?text=NieTracker'">
                    <div class="card-content">
                        <div class="card-title">${item.title}</div>
                        <div class="btn-group">${btns}</div>
                    </div>
                </div>
            `;
        }

        function render() {
            document.getElementById('games').innerHTML = globalData.games.map(createCard).join('');
            document.getElementById('other').innerHTML = globalData.other.map(createCard).join('');
        }

        function switchTab(id, e) {
            document.querySelectorAll('.grid, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
        }

        function showModal(txt) {
            document.getElementById('modal-text').innerText = txt;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        window.onload = loadData;
    </script>
</body>
</html>
