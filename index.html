<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NieTracker | Experience Next</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0c050a;
            --accent-primary: #ff2a6d;
            --accent-secondary: #ff79b5;
            --accent-glow: #ff4da6;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.10);
        }

        * {
            box-sizing: border-box;
            transition: all 0.45s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body {
            margin: 0;
            background: #0a0308;
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Фон */
        .nebula-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: 
                radial-gradient(circle at 25% 25%, rgba(255, 42, 109, 0.28) 0%, transparent 55%),
                radial-gradient(circle at 75% 75%, rgba(255, 121, 181, 0.22) 0%, transparent 60%),
                radial-gradient(circle at 50% 40%, rgba(255, 77, 166, 0.15) 0%, transparent 70%),
                linear-gradient(135deg, #0a0308 0%, #14080f 100%);
            animation: nebulaPulse 28s infinite alternate ease-in-out;
            filter: blur(3px);
        }

        @keyframes nebulaPulse {
            0%   { opacity: 0.9; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.07); }
        }

        /* Частицы за курсором */
        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            mix-blend-mode: screen;
            opacity: 0.85;
        }

        .glow-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), 
                        rgba(255, 77, 166, 0.18) 0%, transparent 45%);
            pointer-events: none;
        }

        .header {
            padding: 130px 20px 70px;
            text-align: center;
        }

        .logo-container {
            width: 145px;
            height: 145px;
            margin: 0 auto 40px;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 50px var(--accent-glow)) brightness(1.2);
            animation: float 6s infinite ease-in-out;
        }

        .main-title {
            font-size: clamp(3.4rem, 9.5vw, 6.2rem);
            font-weight: 900;
            letter-spacing: -6px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ffffff, var(--accent-primary), var(--accent-secondary), #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 250% 250%;
            animation: titleGradient 10s linear infinite;
            filter: drop-shadow(0 20px 40px rgba(255, 42, 109, 0.6));
        }

        @keyframes titleGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-bottom: 80px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 16px 42px;
            border-radius: 9999px;
            color: rgba(255,255,255,0.65);
            font-weight: 700;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .tab-btn:hover {
            color: white;
            transform: translateY(-5px);
            border-color: var(--accent-secondary);
        }

        .tab-btn.active {
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            box-shadow: 0 25px 50px rgba(255, 42, 109, 0.5);
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 25px 140px;
        }

        .grid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 38px;
        }

        .grid.active {
            display: grid;
            animation: fadeInUp 0.9s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(70px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 34px;
            overflow: hidden;
            backdrop-filter: blur(24px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
        }

        .card:hover {
            transform: translateY(-20px) scale(1.035);
            border-color: var(--accent-secondary);
            box-shadow: 0 45px 100px rgba(255, 42, 109, 0.4);
        }

        .card-img {
            width: 100%;
            height: 230px;
            object-fit: cover;
        }

        .card:hover .card-img {
            transform: scale(1.13);
        }

        .card-content {
            padding: 34px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: auto;
        }

        .btn {
            padding: 17px;
            border-radius: 22px;
            font-weight: 800;
            text-align: center;
            cursor: pointer;
            border: none;
        }

        .btn-download {
            background: white;
            color: #0a0308;
        }

        .btn-download:hover {
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            box-shadow: 0 0 45px var(--accent-glow);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.07);
            color: white;
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
            border-color: var(--accent-secondary);
        }

        /* Модальное окно — исправленное и красивое */
        #modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 3, 8, 0.95);
            backdrop-filter: blur(25px);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: rgba(20, 8, 15, 0.98);
            padding: 50px 45px;
            border-radius: 32px;
            max-width: 520px;
            width: 100%;
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: 0 30px 80px rgba(255, 42, 109, 0.35);
        }

        .modal-content h2 {
            margin: 0 0 25px 0;
            font-size: 2rem;
            color: var(--accent-secondary);
        }

        /* Футер */
        footer {
            padding: 100px 20px 70px;
            text-align: center;
            background: linear-gradient(to top, rgba(10, 3, 8, 0.95), transparent);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.06);
        }

        .dev-profile {
            display: inline-flex;
            align-items: center;
            gap: 18px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 18px 28px;
            border-radius: 30px;
            backdrop-filter: blur(20px);
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }

        .dev-profile:hover {
            transform: translateY(-6px);
            border-color: var(--accent-secondary);
            box-shadow: 0 25px 55px rgba(255, 42, 109, 0.35);
        }

        .dev-avatar {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-primary);
            box-shadow: 0 0 25px rgba(255, 42, 109, 0.5);
        }

        .dev-info h3 {
            margin: 0;
            font-size: 1.35rem;
            font-weight: 800;
        }

        .dev-info p {
            margin: 4px 0 0;
            font-size: 0.95rem;
            color: var(--accent-secondary);
        }

        .footer-info {
            margin-top: 45px;
            opacity: 0.4;
            font-size: 13px;
            letter-spacing: 2px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <div class="nebula-bg"></div>
    <canvas id="particle-canvas"></canvas>
    <div class="glow-overlay" id="glow-overlay"></div>

    <header class="header">
        <div class="logo-container">
            <img src="img/logo2.png" alt="Logo" class="logo-img" 
                 onerror="this.src='https://via.placeholder.com/150/0a0308/fff?text=NT'">
        </div>
        <h1 class="main-title">NIETRACKER</h1>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('games', event)">ИГРЫ</button>
        <button class="tab-btn" onclick="switchTab('other', event)">ДРУГОЕ</button>
    </div>

    <div class="container">
        <div id="games" class="grid active"></div>
        <div id="other" class="grid"></div>
    </div>

    <!-- Исправленная модалка -->
    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2>ИНСТРУКЦИЯ</h2>
            <p id="modal-text" style="color: rgba(255,255,255,0.85); line-height: 1.85; font-size: 1.05rem;"></p>
            <button class="btn btn-download" style="width: 100%; margin-top: 30px; padding: 18px;" onclick="closeModal()">
                ПОНЯТНО
            </button>
        </div>
    </div>

    <footer>
        <div class="dev-profile" onclick="window.open('https://github.com/PetyaSosal', '_blank')">
            <img src="https://github.com/PetyaSosal.png" alt="Pettanko" class="dev-avatar">
            <div class="dev-info">
                <h3>Pettanko</h3>
                <p>Дурачок и фембой, футфетешист</p>
            </div>
        </div>
        <div class="footer-info">
            Автор: Pettanko • NieTracker © 2025—2026
        </div>
    </footer>

    <script>
        // Пиксельные частицы
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouseX = 0, mouseY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3.5 + 1.5;
                this.speedX = Math.random() * 1.4 - 0.7;
                this.speedY = Math.random() * 1.4 - 0.7;
                this.life = 48;
                this.color = `hsl(330, 95%, ${78 + Math.random() * 22}%)`;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 1.15;
                this.speedX *= 0.97;
                this.speedY *= 0.97;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life / 48;
                ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (Math.random() < 0.7) particles.push(new Particle(mouseX, mouseY));

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animateParticles);
        }

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            document.getElementById('glow-overlay').style.setProperty('--mouse-x', `${e.clientX}px`);
            document.getElementById('glow-overlay').style.setProperty('--mouse-y', `${e.clientY}px`);
        });

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        animateParticles();

        // Основной функционал
        let globalData = { games: [], other: [] };

        async function loadData() {
            try {
                const response = await fetch('data.json');
                globalData = await response.json();
                render();
            } catch (e) { console.error("Data error", e); }
        }

        function createCard(item) {
            let label = item.label ? 
                `<div style="position:absolute; top:22px; left:22px; background:var(--accent-primary); padding:6px 15px; border-radius:12px; font-size:10.5px; font-weight:900; z-index:2;">${item.label}</div>` : '';

            let btns = `<a href="${item.downloadUrl}" target="_blank" class="btn btn-download">СКАЧАТЬ</a>`;
           
            if (item.instruction) {
                const txt = item.instruction.replace(/'/g, "&apos;").replace(/"/g, "&quot;");
                btns += `<button class="btn btn-secondary" onclick="showModal('${txt}')">ИНСТРУКЦИЯ</button>`;
            }
            if (item.getUrl) {
                btns += `<a href="${item.getUrl}" target="_blank" class="btn btn-secondary">ПОЛУЧИТЬ</a>`;
            }

            return `
                <div class="card">
                    ${label}
                    <img src="${item.image}" class="card-img" onerror="this.src='https://via.placeholder.com/400x250/0a0308/ffffff?text=NieTracker'">
                    <div class="card-content">
                        <div class="card-title">${item.title}</div>
                        <div class="btn-group">${btns}</div>
                    </div>
                </div>
            `;
        }

        function render() {
            document.getElementById('games').innerHTML = globalData.games.map(createCard).join('');
            document.getElementById('other').innerHTML = globalData.other.map(createCard).join('');
        }

        function switchTab(id, e) {
            document.querySelectorAll('.grid, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
        }

        function showModal(txt) {
            document.getElementById('modal-text').innerText = txt;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        window.onload = loadData;
    </script>
</body>
</html>
