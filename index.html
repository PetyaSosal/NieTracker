<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NieTracker | Experience Next</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a0b14;
            --accent-primary: #ff2a6d;
            --accent-secondary: #ff8ec0;
            --accent-glow: #ff4da6;
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        * {
            box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body {
            margin: 0;
            background: #0f0510;
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* === Красивый тёмно-розовый градиентный фон === */
        .nebula-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: 
                radial-gradient(circle at 30% 20%, rgba(255, 42, 109, 0.35) 0%, transparent 60%),
                radial-gradient(circle at 70% 80%, rgba(255, 142, 192, 0.28) 0%, transparent 65%),
                radial-gradient(circle at 50% 50%, rgba(255, 77, 166, 0.18) 0%, transparent 70%),
                linear-gradient(135deg, #1a0b14 0%, #2a0f1f 100%);
            animation: nebulaPulse 25s infinite alternate ease-in-out;
            filter: blur(2px);
        }

        @keyframes nebulaPulse {
            0%   { opacity: 0.85; transform: scale(1) rotate(-1deg); }
            100% { opacity: 1; transform: scale(1.08) rotate(1deg); }
        }

        /* Canvas для частиц за курсором */
        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        /* Освещение и блики */
        .glow-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), 
                        rgba(255, 77, 166, 0.15) 0%, 
                        transparent 50%);
            pointer-events: none;
            opacity: 0.6;
        }

        .header {
            padding: 120px 20px 60px;
            text-align: center;
            position: relative;
        }

        .logo-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 35px;
            position: relative;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 40px var(--accent-glow)) 
                    brightness(1.15) saturate(1.3);
            animation: float 5s infinite ease-in-out;
        }

        .main-title {
            font-size: clamp(3.2rem, 9vw, 5.8rem);
            font-weight: 900;
            margin: 0 0 20px 0;
            letter-spacing: -5px;
            text-transform: uppercase;
            background: linear-gradient(90deg, 
                        #fff 0%, 
                        var(--accent-primary) 25%, 
                        var(--accent-secondary) 50%, 
                        #fff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% 200%;
            animation: titleGradient 8s ease infinite;
            filter: drop-shadow(0 15px 35px rgba(255, 42, 109, 0.5));
        }

        @keyframes titleGradient {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Навигация */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 70px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 16px 40px;
            border-radius: 9999px;
            color: rgba(255,255,255,0.6);
            font-weight: 700;
            font-size: 1.05rem;
            backdrop-filter: blur(16px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .tab-btn:hover {
            color: white;
            transform: translateY(-4px) scale(1.05);
            border-color: var(--accent-secondary);
            box-shadow: 0 15px 35px rgba(255, 42, 109, 0.3);
        }

        .tab-btn.active {
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(255, 42, 109, 0.45);
        }

        /* Контейнер и сетка */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 25px 140px;
            width: 100%;
        }

        .grid {
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 35px;
        }

        .grid.active {
            display: grid;
            animation: fadeInUp 0.8s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(60px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Карточки */
        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            overflow: hidden;
            backdrop-filter: blur(22px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .card:hover {
            transform: translateY(-18px) scale(1.03);
            border-color: var(--accent-secondary);
            box-shadow: 0 40px 90px rgba(255, 42, 109, 0.35);
        }

        .card-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            transition: transform 0.9s ease;
        }

        .card:hover .card-img {
            transform: scale(1.12);
        }

        .card-content {
            padding: 32px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1.55rem;
            font-weight: 800;
            margin-bottom: 28px;
            line-height: 1.2;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: auto;
        }

        .btn {
            padding: 17px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1.02rem;
            text-align: center;
            cursor: pointer;
            border: none;
        }

        .btn-download {
            background: white;
            color: #1a0b14;
            position: relative;
            overflow: hidden;
        }

        .btn-download:hover {
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            box-shadow: 0 0 40px var(--accent-glow);
            transform: translateY(-3px);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: white;
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
            border-color: var(--accent-secondary);
        }

        /* Футер */
        footer {
            padding: 90px 20px 60px;
            text-align: center;
            background: linear-gradient(to top, rgba(26, 11, 20, 0.95), transparent);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .tg-container {
            position: relative;
            display: inline-block;
        }

        .tg-btn {
            display: inline-flex;
            align-items: center;
            padding: 22px 50px;
            background: white;
            color: #1a0b14;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.15rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .tg-glow {
            position: absolute;
            inset: -15px;
            background: linear-gradient(90deg, #ff2a6d, #ff8ec0);
            filter: blur(25px);
            border-radius: 100px;
            opacity: 0;
            z-index: -1;
        }

        .tg-container:hover .tg-glow {
            opacity: 0.75;
            transform: scale(1.15);
        }

        .tg-container:hover .tg-btn {
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            transform: translateY(-6px);
        }

        .footer-info {
            margin-top: 40px;
            opacity: 0.35;
            font-size: 12.5px;
            letter-spacing: 2.5px;
        }

        /* Модальное окно */
        #modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 5, 16, 0.95);
            backdrop-filter: blur(25px);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: rgba(26, 11, 20, 0.95);
            padding: 55px 45px;
            border-radius: 36px;
            max-width: 520px;
            width: 100%;
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: 0 30px 80px rgba(255, 42, 109, 0.3);
        }
    </style>
</head>
<body>

    <!-- Фон -->
    <div class="nebula-bg"></div>
    <canvas id="particle-canvas"></canvas>
    <div class="glow-overlay" id="glow-overlay"></div>

    <header class="header">
        <div class="logo-container">
            <img src="img/logo2.png" alt="Logo" class="logo-img" 
                 onerror="this.src='https://via.placeholder.com/150/1a0b14/fff?text=NT'">
        </div>
        <h1 class="main-title" id="title">NIETRACKER</h1>
    </header>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('games', event)">ИГРЫ</button>
        <button class="tab-btn" onclick="switchTab('other', event)">ДРУГОЕ</button>
    </div>

    <div class="container">
        <div id="games" class="grid active"></div>
        <div id="other" class="grid"></div>
    </div>

    <!-- Модалка -->
    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h2 style="margin-top:0; font-size: 2rem;">ИНСТРУКЦИЯ</h2>
            <p id="modal-text" style="color: rgba(255,255,255,0.7); line-height: 1.85; margin: 25px 0 35px;"></p>
            <button class="btn btn-download" style="width: 100%; font-size: 1.1rem;" onclick="closeModal()">
                ПОНЯТНО
            </button>
        </div>
    </div>

    <footer>
        <div class="tg-container">
            <div class="tg-glow"></div>
            <a href="https://t.me/nierosyjski" target="_blank" class="tg-btn">
                TELEGRAM КАНАЛ
            </a>
        </div>
        <div class="footer-info">
            PETTA RAIN | NIETRACKER © 2026
            <a href="admin.html" style="text-decoration: none; color: inherit; opacity: 0.5;">.</a>
        </div>
    </footer>

    <script>
        // === Частицы за курсором (пиксельный стиль) ===
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouseX = 0, mouseY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3.5 + 1.5;
                this.speedX = Math.random() * 1.2 - 0.6;
                this.speedY = Math.random() * 1.2 - 0.6;
                this.life = 45;
                this.color = `hsl(330, 100%, ${80 + Math.random() * 20}%)`;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life--;
                this.speedX *= 0.98;
                this.speedY *= 0.98;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life / 45;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (Math.random() < 0.6) {
                particles.push(new Particle(mouseX, mouseY));
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();

                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animateParticles);
        }

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            // Обновляем позицию свечения
            document.getElementById('glow-overlay').style.setProperty('--mouse-x', `${e.clientX}px`);
            document.getElementById('glow-overlay').style.setProperty('--mouse-y', `${e.clientY}px`);
        });

        window.addEventListener('resize', resizeCanvas);

        // Инициализация
        resizeCanvas();
        animateParticles();

        // === Остальной функционал (без изменений) ===
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            document.documentElement.style.setProperty('--mouse-x', `${x}%`);
            document.documentElement.style.setProperty('--mouse-y', `${y}%`);
        });

        let globalData = { games: [], other: [] };

        async function loadData() {
            try {
                const response = await fetch('data.json');
                globalData = await response.json();
                render();
            } catch (e) {
                console.error("Data error", e);
            }
        }

        function createCard(item) {
            let label = item.label ? 
                `<div style="position:absolute; top:20px; left:20px; background:var(--accent-primary); padding:6px 14px; border-radius:12px; font-size:10px; font-weight:900; z-index:2; box-shadow: 0 0 15px rgba(255,42,109,0.6);">${item.label}</div>` : '';

            let btns = `<a href="${item.downloadUrl}" target="_blank" class="btn btn-download">СКАЧАТЬ</a>`;
           
            if (item.instruction) {
                const txt = item.instruction.replace(/'/g, "&apos;").replace(/"/g, "&quot;");
                btns += `<button class="btn btn-secondary" onclick="showModal('${txt}')">ИНСТРУКЦИЯ</button>`;
            }
            if (item.getUrl) {
                btns += `<a href="${item.getUrl}" target="_blank" class="btn btn-secondary">ПОЛУЧИТЬ</a>`;
            }

            return `
                <div class="card">
                    ${label}
                    <img src="${item.image}" class="card-img" onerror="this.src='https://via.placeholder.com/400x250/1a0b14/ffffff?text=NieTracker'">
                    <div class="card-content">
                        <div class="card-title">${item.title}</div>
                        <div class="btn-group">${btns}</div>
                    </div>
                </div>
            `;
        }

        function render() {
            document.getElementById('games').innerHTML = globalData.games.map(createCard).join('');
            document.getElementById('other').innerHTML = globalData.other.map(createCard).join('');
        }

        function switchTab(id, e) {
            document.querySelectorAll('.grid, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            e.currentTarget.classList.add('active');
        }

        function showModal(txt) {
            document.getElementById('modal-text').innerText = txt;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        window.onload = loadData;
    </script>
</body>
</html>
